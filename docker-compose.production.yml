version: '3.8'

services:
  # Base de datos de grafos
  neo4j:
    image: neo4j:5.12.0-enterprise
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4J_dbms_memory_pagecache_size=4G
      - NEO4J_dbms_memory_heap_max__size=8G
      - NEO4J_dbms_default__database=acag_production
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./config/neo4j.conf:/etc/neo4j/neo4j.conf:ro
    deploy:
      resources:
        limits:
          memory: 12G
        reservations:
          memory: 8G
    networks:
      - acag-network
    restart: unless-stopped

  # Cache y colas
  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    networks:
      - acag-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  # Servidor principal de la aplicación
  api:
    build:
      context: .
      dockerfile: Dockerfile.production
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - NEO4J_URI=bolt://neo4j:7687
      - REDIS_URL=redis://redis:6379/0
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_ENVIRONMENT=${PINECONE_ENVIRONMENT}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    depends_on:
      - neo4j
      - redis
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - /var/log/acag:/app/logs
    networks:
      - acag-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'
        reservations:
          memory: 2G
          cpus: '1'

  # Worker para procesamiento asíncrono
  worker:
    build:
      context: .
      dockerfile: Dockerfile.production
    command: ["python", "-m", "src.core.worker"]
    environment:
      - ENVIRONMENT=production
      - NEO4J_URI=bolt://neo4j:7687
      - REDIS_URL=redis://redis:6379/0
      - PINECONE_API_KEY=${PINECONE_API_KEY}
    depends_on:
      - redis
      - neo4j
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - /var/log/acag:/app/logs
    networks:
      - acag-network
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 8G
          cpus: '4'
        reservations:
          memory: 4G
          cpus: '2'

volumes:
  neo4j_data:
    driver: local
    driver_opts:
      type: ext4
      o: size=50G
  neo4j_logs:
    driver: local
  redis_data:
    driver: local

networks:
  acag-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16