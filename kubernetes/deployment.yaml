apiVersion: apps/v1
kind: Deployment
metadata:
  name: acag-api
  namespace: acag-production
  labels:
    app: acag-api
    component: api
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: acag-api
  template:
    metadata:
      labels:
        app: acag-api
        component: api
    spec:
      containers:
      - name: acag-api
        image: acag-api:1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: NEO4J_URI
          value: "bolt://neo4j.acag-production.svc.cluster.local:7687"
        - name: REDIS_URL
          value: "redis://redis.acag-production.svc.cluster.local:6379"
        - name: PINECONE_API_KEY
          valueFrom:
            secretKeyRef:
              name: acag-secrets
              key: pinecone-api-key
        resources:
          requests:
            memory: "2Gi"
            cpu: "1"
          limits:
            memory: "4Gi"
            cpu: "2"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: models-volume
          mountPath: /app/models
        - name: data-volume
          mountPath: /app/data
        - name: log-volume
          mountPath: /app/logs
      volumes:
      - name: models-volume
        persistentVolumeClaim:
          claimName: models-pvc
      - name: data-volume
        persistentVolumeClaim:
          claimName: data-pvc
      - name: log-volume
          persistentVolumeClaim:
          claimName: logs-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: acag-api
  namespace: acag-production
spec:
  selector:
    app: acag-api
  ports:
  - port: 8000
    targetPort: 8000
  type: LoadBalancer